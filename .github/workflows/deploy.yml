name: Build and Deploy UI

on:
  push:
    branches: [ main ]
    paths-ignore:        # don't redeploy the app for doc-only changes
      - '**.md'
      - 'LICENSE'
      - '.github/**'
  workflow_dispatch:     # manual trigger — needed since .github/** is push-ignored above

# Needs repo secrets: HETZNER_HOST, HETZNER_SSH_KEY (same host as real-retro-api).
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (inject UI version)
        env:
          GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Deploy to Hetzner (rsync dist -> /srv/retro-ui)
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -az --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            dist/ deploy@${{ secrets.HETZNER_HOST }}:/srv/retro-ui/
          rm -f /tmp/deploy_key
